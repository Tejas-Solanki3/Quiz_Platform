<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz - Quizzer</title>
    <script src="/static/js/theme.js?v={{ CACHE_VERSION }}"></script>
    <link rel="stylesheet" href="/static/css/styles.css?v={{ CACHE_VERSION }}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1" style="opacity: 0.1; top: -10%;"></div>
    </div>

    <nav>
        <div class="container nav-container">
            <a href="/dashboard" class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#8B5CF6"/>
                    <path d="M2 17L12 22L22 17" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Quizzer</span>
            </a>
            
                <div class="nav-links" >
                <!-- Theme Toggle -->
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
</button>
                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </nav>

    <div class="container animate-in" style="max-width: 800px; padding-top: 40px; padding-bottom: 100px;">
        <div style="margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Create a New Quiz</h1>
            <p style="color: var(--color-text-secondary); font-size: 1.1rem;">Build engaging assessments in minutes.</p>
        </div>
        
        <form id="create-quiz-form">
            <div class="card" style="margin-bottom: 30px;">
                <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Quiz Details</h2>
                <div class="form-group">
                    <label>Quiz Title</label>
                    <input type="text" id="title" placeholder="e.g., Introduction to Python" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Description</label>
                    <textarea id="description" rows="3" placeholder="What is this quiz about?" required></textarea>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; margin-top: 50px;">
                <h2 style="font-size: 1.5rem; margin: 0;">Questions</h2>
                <button type="button" class="btn btn-secondary" onclick="addQuestion()" style="padding: 8px 16px; font-size: 0.9rem;">+ Add Question</button>
            </div>

            <div id="questions-container">
                <!-- Question 1 Template -->
                <div class="card question-card animate-in" style="margin-bottom: 24px; padding: 32px; border-top: 4px solid var(--color-primary);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0; font-size: 1.2rem;">Question 1</h3>
                        <button type="button" class="btn btn-secondary" style="color: var(--color-danger); border-color: rgba(239, 68, 68, 0.3); padding: 4px 12px; font-size: 0.8rem;" onclick="this.parentElement.parentElement.remove()">Remove</button>
                    </div>
                    
                    <div class="form-group">
                        <label>Question Text</label>
                        <input type="text" class="q-text" placeholder="e.g., What is 2 + 2?" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                        <div class="form-group" style="margin: 0;">
                            <label>Option 1</label>
                            <input type="text" class="q-opt" placeholder="Option 1" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Option 2</label>
                            <input type="text" class="q-opt" placeholder="Option 2" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Option 3</label>
                            <input type="text" class="q-opt" placeholder="Option 3" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Option 4</label>
                            <input type="text" class="q-opt" placeholder="Option 4" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group" style="margin: 0;">
                            <label>Correct Answer</label>
                            <input type="text" class="q-correct" placeholder="Must exactly match one option" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Time Limit</label>
                            <select class="q-time">
                                <option value="10s">10 Seconds</option>
                                <option value="20s">20 Seconds</option>
                                <option value="30s" selected>30 Seconds</option>
                                <option value="60s">60 Seconds</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card" style="margin-top: 40px; background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.2); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="margin-bottom: 4px; font-size: 1.2rem;">Ready to publish?</h3>
                    <p style="color: var(--color-text-secondary); font-size: 0.95rem;">Published quizzes are visible to students immediately.</p>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="is_published" style="width: 20px; height: 20px; accent-color: var(--color-success);">
                    <label for="is_published" style="font-weight: 500; font-size: 1rem;">Publish Now</label>
                </div>
            </div>

            <div style="margin-top: 40px;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.2rem;">Save Quiz</button>
            </div>
        </form>
    </div>

    <script src="/static/js/api.js?v={{ CACHE_VERSION }}"></script>
    <script>
        let qCount = 1;

        function addQuestion() {
            qCount++;
            const container = document.getElementById('questions-container');
            const html = `
                <div class="card question-card animate-in" style="margin-bottom: 24px; padding: 32px; border-top: 4px solid var(--color-primary);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0; font-size: 1.2rem;">Question ${qCount}</h3>
                        <button type="button" class="btn btn-secondary" style="color: var(--color-danger); border-color: rgba(239, 68, 68, 0.3); padding: 4px 12px; font-size: 0.8rem;" onclick="this.parentElement.parentElement.remove()">Remove</button>
                    </div>
                    
                    <div class="form-group">
                        <label>Question Text</label>
                        <input type="text" class="q-text" placeholder="e.g., What is 2 + 2?" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                        <div class="form-group" style="margin: 0;">
                            <label>Option 1</label>
                            <input type="text" class="q-opt" placeholder="Option 1" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Option 2</label>
                            <input type="text" class="q-opt" placeholder="Option 2" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Option 3</label>
                            <input type="text" class="q-opt" placeholder="Option 3" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Option 4</label>
                            <input type="text" class="q-opt" placeholder="Option 4" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group" style="margin: 0;">
                            <label>Correct Answer</label>
                            <input type="text" class="q-correct" placeholder="Must exactly match one option" required>
                        </div>
                        <div class="form-group" style="margin: 0;">
                            <label>Time Limit</label>
                            <select class="q-time">
                                <option value="10s">10 Seconds</option>
                                <option value="20s">20 Seconds</option>
                                <option value="30s" selected>30 Seconds</option>
                                <option value="60s">60 Seconds</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        document.getElementById('create-quiz-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const is_published = document.getElementById('is_published').checked;
            
            const qCards = document.querySelectorAll('.question-card');
            const questions = [];
            
            let isValid = true;

            qCards.forEach(card => {
                const text = card.querySelector('.q-text').value;
                const opts = Array.from(card.querySelectorAll('.q-opt')).map(i => i.value.trim()).filter(v => v);
                const correct = card.querySelector('.q-correct').value.trim();
                const time = card.querySelector('.q-time').value;
                
                if (opts.length < 2) {
                    alert('Each question must have at least 2 options.');
                    isValid = false;
                }
                if (!opts.includes(correct)) {
                    alert(`Correct answer "${correct}" does not exactly match any of the options for question: "${text}"`);
                    isValid = false;
                }

                questions.push({
                    question_text: text,
                    options: opts,
                    correct_answer: correct,
                    time_limit: time
                });
            });

            if (!isValid) return;

            try {
                await api.post('/quizzes', {
                    title, description, questions, is_published
                });
                alert('Quiz created successfully!');
                window.location.href = '/dashboard';
            } catch (err) {
                alert('Error creating quiz: ' + err.message);
            }
        });
    </script>
</body>
</html>
